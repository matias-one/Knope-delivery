<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Head background (brown fur) -->
  <ellipse cx="256" cy="256" rx="180" ry="200" fill="#8B6F47"/>
  
  <!-- Fur texture - darker shading -->
  <path d="M 200 120 Q 180 100 160 110 Q 150 130 170 150 Z" fill="#6B5436"/>
  <path d="M 320 110 Q 340 95 360 115 Q 370 140 350 155 Z" fill="#6B5436"/>
  <path d="M 280 80 Q 290 60 310 75 Q 305 95 290 100 Z" fill="#6B5436"/>
  
  <!-- Left side fur spikes -->
  <path d="M 140 200 Q 120 190 110 210 Q 125 215 140 210 Z" fill="#6B5436"/>
  <path d="M 130 260 Q 105 250 100 275 Q 120 280 135 270 Z" fill="#6B5436"/>
  <path d="M 145 320 Q 125 315 120 340 Q 140 345 155 330 Z" fill="#6B5436"/>
  
  <!-- Right side fur spikes -->
  <path d="M 372 200 Q 392 190 402 210 Q 387 215 372 210 Z" fill="#6B5436"/>
  <path d="M 382 260 Q 407 250 412 275 Q 392 280 377 270 Z" fill="#6B5436"/>
  <path d="M 367 320 Q 387 315 392 340 Q 372 345 357 330 Z" fill="#6B5436"/>
  
  <!-- Face (cream/beige) -->
  <ellipse cx="256" cy="280" rx="110" ry="130" fill="#E8DCC8"/>
  
  <!-- Snout/mouth area -->
  <ellipse cx="256" cy="320" rx="85" ry="75" fill="#D4C4B0"/>
  
  <!-- Nose -->
  <ellipse cx="256" cy="300" rx="25" ry="22" fill="#2C2C2C"/>
  <ellipse cx="250" cy="295" rx="8" ry="6" fill="#1A1A1A"/>
  
  <!-- Mouth line -->
  <path d="M 220 320 Q 256 340 292 320" stroke="#2C2C2C" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Lower lip -->
  <path d="M 210 340 Q 256 360 302 340" stroke="#2C2C2C" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Teeth -->
  <line x1="235" y1="320" x2="235" y2="335" stroke="#2C2C2C" stroke-width="3"/>
  <line x1="256" y1="320" x2="256" y2="340" stroke="#2C2C2C" stroke-width="3"/>
  <line x1="277" y1="320" x2="277" y2="335" stroke="#2C2C2C" stroke-width="3"/>
  
  <!-- White eye mask area (left) -->
  <ellipse cx="210" cy="220" rx="45" ry="55" fill="#F5F5F5" transform="rotate(-25 210 220)"/>
  
  <!-- White eye mask area (right) -->
  <ellipse cx="302" cy="220" rx="45" ry="55" fill="#F5F5F5" transform="rotate(25 302 220)"/>
  
  <!-- Left eye -->
  <ellipse cx="200" cy="210" rx="18" ry="28" fill="#2C2C2C" transform="rotate(-20 200 210)"/>
  <circle cx="205" cy="205" r="6" fill="#FFFFFF"/>
  
  <!-- Right eye -->
  <ellipse cx="312" cy="210" rx="18" ry="28" fill="#2C2C2C" transform="rotate(20 312 210)"/>
  <circle cx="307" cy="205" r="6" fill="#FFFFFF"/>
  
  <!-- Eyebrows (angry expression) -->
  <path d="M 175 180 Q 200 165 220 175" stroke="#2C2C2C" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 292 175 Q 312 165 337 180" stroke="#2C2C2C" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Forehead wrinkles -->
  <path d="M 240 150 Q 256 145 272 150" stroke="#2C2C2C" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Curl on top right -->
  <path d="M 310 120 Q 330 110 340 130" stroke="#6B5436" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Trademark -->
  <text x="430" y="480" font-size="24" font-weight="bold" fill="#2C2C2C">™</text>
</svg>