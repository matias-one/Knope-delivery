<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APES Portal</title>

    <!-- Shared Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>

<body>

<!-- PROTECT PAGE -->
<script>
if (localStorage.getItem("apes_logged_in") !== "yes") {
    window.location.href = "login.html";
}
</script>

<!-- TOPBAR (loaded dynamically) -->
<div id="topbar"></div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="brand-section">
        <img src="logo.png" class="brand-logo" onerror="this.style.display='none'">
        <div class="brand-name">APES | PackRoute</div>
    </div>

    <div class="menu-title">Applications</div>
    <nav class="nav-links">
        <a href="./dashboard.html" class="nav-item active">🏠 Dashboard</a>
        <a href="./slip.html" class="nav-item">📄 Delivery Slip</a>
        <a href="#" class="nav-item disabled">🏷️ Thermal Labels</a>
    </nav>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <div class="welcome-card">
        <h1>Welcome to the Logistics Hub</h1>
        <p>Select a tool from the sidebar menu to quickly process orders, print delivery configurations, or manage cargo configurations.</p>
    </div>

</div>

<!-- LOAD TOPBAR COMPONENT -->
<script>
fetch("topbar.html")
  .then(res => res.text())
  .then(html => {
      document.getElementById("topbar").innerHTML = html;

      // Fill user info
      const username = localStorage.getItem("apes_username");
      document.getElementById("apes-user").textContent = username;
      document.getElementById("dd-username").textContent = username;
      document.getElementById("dd-email").textContent = username + "@apes.com";
  });

function toggleMenu() {
    document.querySelector(".user-menu").classList.toggle("open");
}


function logout() {
    localStorage.removeItem("apes_logged_in");
    localStorage.removeItem("apes_username");
    window.location.href = "login.html";
}
</script>

</body>
</html>
