<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APES Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Container */
        .sidebar {
            width: 260px;
            background-color: #0f172a; /* Sleek dark slate blue */
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            border-right: 1px solid #1e293b;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        /* Logo Placeholder - updates dynamically if logo.png exists */
        .brand-logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .brand-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .menu-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .nav-item:hover {
            background-color: #1e293b;
            color: #f8fafc;
        }

        /* Highlights which page you are currently on */
        .nav-item.active {
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .nav-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Main Workspace Area */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .welcome-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .welcome-card h1 {
            color: #1e293b;
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 8px;
        }

        .welcome-card p {
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

<script>
if (localStorage.getItem("apes_logged_in") !== "yes") {
    window.location.href = "login.html";
}
</script>

<div class="user-bar">
    Logged in as: <strong id="apes-user"></strong>
    <button onclick="logout()" class="leave-match">Leave Match</button>
</div>

<script>
document.getElementById("apes-user").textContent = localStorage.getItem("apes_username");

function logout() {
    localStorage.removeItem("apes_logged_in");
    localStorage.removeItem("apes_username");
    window.location.href = "login.html";
}
</script>


<script>
if (localStorage.getItem("apes_logged_in") !== "yes") {
    window.location.href = "login.html";
}
</script>

    <div class="sidebar">
        <div class="brand-section">
            <img src="logo.png" alt="📦" class="brand-logo" onerror="this.style.display='none'">
            <div class="brand-name">APES | PackRoute</div>
        </div>

        <div class="menu-title">Applications</div>
        <nav class="nav-links">
            <a href="./dashboard.html" class="nav-item active">🏠 Dashboard</a>
            <a href="./slip.html" class="nav-item">📄 Delivery Slips</a>
            <a href="#" class="nav-item disabled">🏷️ Thermal Labels</a>
        </nav>


        <p style="font-family: 'Inter', sans-serif; font-size: 12px; color: #475569; font-weight: 500; letter-spacing: 0.05em; margin: 0; padding-top: 20px; border-top: 1px solid #1e293b;">
            by <span style="color: #b45309; font-weight: 900;">M</span><span style="color: #d97706; font-weight: 700;">ONE</span>
        </p>
    </div>

    <div class="main-content">
        <div class="welcome-card">
            <h1>Welcome to the Logistics Hub</h1>
            <p>Select a tool from the sidebar menu to quickly process orders, print delivery configurations, or manage cargo configurations.</p>
        </div>
    </div>

</body>
</html>
