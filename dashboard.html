<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APES Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: #0f172a;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            border-right: 1px solid #1e293b;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .brand-name {
            font-size: 20px;
            font-weight: 700;
        }

        .menu-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-item {
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .nav-item:hover {
            background-color: #1e293b;
            color: #f8fafc;
        }

        .nav-item.active {
            background-color: #4f46e5;
            color: white;
        }

        .nav-item.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Main content */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            box-sizing: border-box;
        }

        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #334155;
        }

        .leave-match {
            background: #ef4444;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .leave-match:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .welcome-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            text-align: center;
            max-width: 500px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- PROTECT PAGE -->
<script>
if (localStorage.getItem("apes_logged_in") !== "yes") {
    window.location.href = "login.html";
}
</script>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="brand-section">
        <img src="logo.png" class="brand-logo" onerror="this.style.display='none'">
        <div class="brand-name">APES | PackRoute</div>
    </div>

    <div class="menu-title">Applications</div>
    <nav class="nav-links">
        <a href="./dashboard.html" class="nav-item active">🏠 Dashboard</a>
        <a href="./slip.html" class="nav-item">📄 Delivery Slips</a>
        <a href="#" class="nav-item disabled">🏷️ Thermal Labels</a>
    </nav>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <div class="user-bar">
        Logged in as: <strong id="apes-user"></strong>
        <button onclick="logout()" class="leave-match">Leave Match</button>
    </div>

    <div class="welcome-card">
        <h1>Welcome to the Logistics Hub</h1>
        <p>Select a tool from the sidebar menu to quickly process orders, print delivery configurations, or manage cargo configurations.</p>
    </div>

</div>

<script>
document.getElementById("apes-user").textContent = localStorage.getItem("apes_username");

function logout() {
    localStorage.removeItem("apes_logged_in");
    localStorage.removeItem("apes_username");
    window.location.href = "login.html";
}
</script>

</body>
</html>
