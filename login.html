<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>APES | Login</title> <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"> <style> body { margin: 0; font-family: 'Poppins', sans-serif; background-color: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; }

    .login-card {
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        width: 100%;
        max-width: 380px;
        text-align: center;
    }

    .brand-logo {
        width: 60px;
        height: 60px;
        object-fit: contain;
        margin-bottom: 10px;
    }

    h2 {
        margin: 0 0 20px;
        font-size: 24px;
        color: #1e293b;
        font-weight: 700;
    }

    .input-group {
        text-align: left;
        margin-bottom: 20px;
    }

    label {
        font-size: 13px;
        font-weight: 600;
        color: #475569;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        font-size: 14px;
        box-sizing: border-box;
    }

    .login-btn {
        width: 100%;
        padding: 12px;
        background-color: #4f46e5;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .login-btn:hover {
        background-color: #4338ca;
    }

    .back-link {
        display: block;
        margin-top: 20px;
        font-size: 13px;
        color: #64748b;
        text-decoration: none;
    }

    .back-link:hover {
        color: #334155;
    }
</style>

</head> <body>

<div class="login-card">
    <img src="logo.png" alt="Logo" class="brand-logo" onerror="this.style.display='none'">
    <h2>Sign in to APES</h2>

    <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password">
    </div>

    <button class="login-btn" onclick="window.location.href='dashboard.html'">Login</button>


    <a href="home.html" class="back-link">← Back to Home</a>
</div>

</body> </html>
