<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APES Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .portal-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 5px;
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .launcher-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .launch-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            background-color: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }

        .launch-btn:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(79, 70, 229, 0.25);
        }

        /* Styling for a disabled/upcoming tool button */
        .launch-btn.disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
        }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #b5651d; /* Your signature amber color */
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <h1>APES Portal</h1>
        <div class="subtitle">Warehouse Fulfillment & Logistics Hub</div>

        <div class="launcher-grid">
            <a href="./slip.html" class="launch-btn">
                📄 Open Delivery Slip Generator
            </a>

            <a href="#" class="launch-btn disabled">
                🏷️ Thermal Label Maker (Coming Soon)
            </a>
        </div>

        <div class="footer">by MONE</div>
    </div>

</body>
</html>
